# Dependabot - 自动化依赖更新
# 文档: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # Cargo 依赖更新（Rust 项目主依赖）
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "cargo"
    commit-message:
      prefix: "deps(cargo)"
      include: "scope"
    groups:
      # 安全更新单独分组，优先合并
      security-updates:
        update-types:
          - "patch"
        applies-to: "security-updates"
      # 次要版本更新分组
      minor-updates:
        update-types:
          - "minor"
        applies-to: "version-updates"

  # GitHub Actions 版本更新
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps(ci)"
      include: "scope"
