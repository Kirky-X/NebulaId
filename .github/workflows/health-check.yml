name: Health Check

on:
  # 定时健康检查：每日 UTC 02:00 运行（与 ci.yml 的 push/PR 触发解耦，避免重复）
  schedule:
    - cron: '0 2 * * *'
  # 支持手动触发
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # 限定 --package nebulaid，避免扫描 path 依赖（与 ci.yml 保持一致）
  PKG: nebulaid

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 快速检查：格式和审计
  quick-check:
    name: Quick Check (fmt + audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "nebula-health"
          cache-targets: false

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security Audit
        run: cargo audit --deny warnings

      - name: Format Check
        run: cargo fmt --package ${{ env.PKG }} -- --check

      - name: Clippy Lint
        # 不使用 --all-features：postgresql 与 sqlite 互斥（dbnexus compile_error），与 ci.yml 保持一致
        run: cargo clippy --package ${{ env.PKG }} --features postgresql,etcd,http,grpc -- -D warnings

  # 构建检查
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quick-check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "nebula-health"
          cache-targets: false

      - name: Build Project
        run: cargo build --package ${{ env.PKG }} --features postgresql,etcd,http,grpc

  # 测试
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "nebula-health"
          cache-targets: false

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Run Tests with Coverage
        run: cargo llvm-cov --package ${{ env.PKG }} --features postgresql,etcd,http,grpc --fail-under-lines 80 --lcov --output-path lcov.info

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
