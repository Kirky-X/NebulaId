name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: nebula-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 预检：检测 secrets 是否存在（GitHub Actions 不能直接在 if 里比较 secrets）
  check-secrets:
    name: Check Registry Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      has_cargo_token: ${{ steps.check.outputs.has_cargo_token }}
      has_npm_token: ${{ steps.check.outputs.has_npm_token }}
    steps:
      - name: Detect registry tokens
        id: check
        run: |
          if [ -n "${{ secrets.CARGO_REGISTRY_TOKEN }}" ]; then
            echo "has_cargo_token=true" >> $GITHUB_OUTPUT
          else
            echo "has_cargo_token=false" >> $GITHUB_OUTPUT
          fi
          if [ -n "${{ secrets.NPM_TOKEN }}" ]; then
            echo "has_npm_token=true" >> $GITHUB_OUTPUT
          else
            echo "has_npm_token=false" >> $GITHUB_OUTPUT
          fi

  # LOW-4 修复（CWE-1357）：发布前强制安全审查门禁。
  # 规则 19 要求「发布前强制安全审查」——任何 tag 发布前必须通过
  # cargo-audit（RustSec advisory-db）+ cargo-deny（许可证/重复依赖/ban）。
  # 任一失败立即阻断发布流水线，禁止打 tag 后绕过审查。
  #
  # SEC-LOW-004 修复（CWE-1357 mutable action tags）：使用 major version
  # tag（`@v4` / `@stable` / `@v2`）而非 SHA pin。决策权衡：
  # - SHA pin：安全性最高（防止 action 仓库被攻陷后注入恶意代码），
  #   但维护成本高（每次升级需手动更新 SHA，且 dependabot 自动升级
  #   也只是把 SHA 替换为新 SHA，PR 审查负担重）。
  # - major version tag：GitHub 官方推荐做法，由 action owner 维护
  #   tag 指向最新 patch release。配合 `.github/dependabot.yml` 的
  #   `github-actions` ecosystem 配置，自动升级到最新 minor/patch。
  # - 折中：本流水线使用 major version tag + dependabot 自动升级，
  #   平衡安全性与可维护性。如未来安全要求升级，可改为 SHA pin。
  pre-release-audit:
    name: Pre-release Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit (--deny warnings)
        run: cargo audit --deny warnings

      - name: cargo-deny check
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          log-level: warn

  # 发布到 crates.io（仅在 CARGO_REGISTRY_TOKEN 存在时执行，无 secret 跳过不报错）
  publish-cargo:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [check-secrets, pre-release-audit]
    if: needs.check-secrets.outputs.has_cargo_token == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "nebula-publish"
          cache-targets: false

      - name: Validate Package
        run: cargo check --package nebulaid --all-features

      - name: Get crates.io Auth Token
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish to crates.io
        run: |
          cargo publish -p nebulaid --all-features || \
            cargo publish -p nebulaid
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # 多平台构建
  build-release:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    needs: [pre-release-audit]
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        include:
          - os: ubuntu-latest
            artifact_name: nebula-id
            asset_name: nebula-id-linux-x86_64.tar.gz
          - os: windows-latest
            artifact_name: nebula-id.exe
            asset_name: nebula-id-windows-x86_64.zip
          - os: macos-latest
            artifact_name: nebula-id
            asset_name: nebula-id-macos-x86_64.tar.gz

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == *"ubuntu"* ]]; then
            sudo apt-get update && sudo apt-get install -y protobuf-compiler
          elif [[ "${{ matrix.os }}" == *"macos"* ]]; then
            brew install protobuf
          elif [[ "${{ matrix.os }}" == *"windows"* ]]; then
            choco install protoc
          fi

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "nebula-build-${{ matrix.os }}"
          cache-targets: false

      - name: Build Release Binary
        run: cargo build --release --locked

      - name: Create Artifact
        run: |
          mkdir -p release
          cp target/release/${{ matrix.artifact_name }} release/
          cd release
          if [[ "${{ matrix.os }}" == *"windows"* ]]; then
            tar -czf ../${{ matrix.asset_name }} .
          else
            if [[ "${{ matrix.os }}" == *"ubuntu"* ]]; then
              tar -czf ../${{ matrix.asset_name }} .
            else
              tar -czf ../${{ matrix.asset_name }} .
            fi
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release/${{ matrix.asset_name }}
          compression-level: 9
          retention-days: 30

  # 创建 GitHub Release
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-release
    if: always() && (needs.build-release.result != 'skipped')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
        continue-on-error: true

      - name: List Artifacts
        run: |
          echo "=== Artifacts downloaded ==="
          if [ -d "artifacts" ] && [ "$(ls -A artifacts 2>/dev/null)" ]; then
            ls -la artifacts/
            echo "Found $(find artifacts -type f | wc -l) artifact(s)"
          else
            echo "⚠️ No artifacts found!"
          fi
          echo "============================"

      - name: Check Build Status
        run: |
          BUILD_RESULT="${{ needs.build-release.result }}"
          echo "Build matrix result: $BUILD_RESULT"
          if [[ "$BUILD_RESULT" != "success" ]]; then
            echo "⚠️ Some platform builds may have failed"
          fi

      - name: Check if artifacts exist
        id: check-artifacts
        run: |
          if [ -d "artifacts" ] && [ "$(ls -A artifacts 2>/dev/null)" ]; then
            echo "has_artifacts=true" >> $GITHUB_OUTPUT
          else
            echo "has_artifacts=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release (with artifacts)
        if: steps.check-artifacts.outputs.has_artifacts == 'true'
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          name: Release v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (without artifacts - tag only)
        if: steps.check-artifacts.outputs.has_artifacts == 'false'
        uses: softprops/action-gh-release@v3
        with:
          name: Release v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 通知状态
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [publish-cargo, github-release]
    if: always()
    steps:
      - name: Check Release Status
        run: |
          CARGO_STATUS="${{ needs.publish-cargo.result }}"
          GITHUB_STATUS="${{ needs.github-release.result }}"
          
          echo "================================"
          echo "  Release Pipeline Summary"
          echo "================================"
          echo ""
          echo "Cargo Publish: $CARGO_STATUS"
          echo "GitHub Release: $GITHUB_STATUS"
          echo ""
          
          if [[ "$GITHUB_STATUS" == "success" ]]; then
            echo "✅ GitHub Release created successfully!"
            echo "  - Tag: v${{ github.ref_name }}"
            echo "  - URL: https://github.com/${{ github.repository }}/releases/tag/v${{ github.ref_name }}"
          fi
          
          if [[ "$CARGO_STATUS" != "success" ]]; then
            echo "❌ Cargo publish failed or skipped"
          fi
          
          echo ""
          echo "================================"