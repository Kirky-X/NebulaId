# Pre-commit hooks for Nebula ID Rust Project
#
# This configuration provides automatic code quality checks before commits.
# Install pre-commit: pip install pre-commit
# Install hooks: pre-commit install
# Update hooks: pre-commit autoupdate
#
# See AGENTS.md for code quality requirements.

repos:
  # Rust Code Formatting (cargo fmt)
  # 限定 --package nebulaid，避免扫描 path 依赖（confers/oxcache/dbnexus/limiteron）
  - repo: local
    hooks:
      - id: cargo-fmt
        name: Rust Code Formatting
        description: Check code formatting with cargo fmt
        entry: bash -c 'cargo fmt --package nebulaid -- --check'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

  # Rust Static Analysis (cargo clippy)
  # 限定 --package nebulaid，避免扫描 path 依赖
  - repo: local
    hooks:
      - id: cargo-clippy
        name: Rust Static Analysis
        description: Run cargo clippy for code quality analysis
        entry: bash -c 'cargo clippy --package nebulaid --all-features -- -D warnings'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

  # Rust Compilation Check (cargo check)
  # 限定 --package nebulaid，避免扫描 path 依赖
  - repo: local
    hooks:
      - id: cargo-check
        name: Rust Compilation Check
        description: Verify project compiles without errors
        entry: bash -c 'cargo check --package nebulaid --all-features'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

# Global Settings
default_install_hook_types: [pre-commit]
default_stages: [pre-commit]
minimum_pre_commit_version: '3.0.0'

# Fail fast on first error
fail_fast: true
