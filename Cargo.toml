[package]
name = "nebulaid"
version = "0.2.0"
description = "Enterprise-grade distributed ID generation system"
authors = ["Kirky.X"]
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/Kirky-X/NebulaId"
homepage = "https://github.com/Kirky-X/NebulaId"
keywords = ["distributed", "id-generator", "snowflake", "uuid"]
categories = ["development-tools", "database"]

[lib]
name = "nebulaid"
path = "src/lib.rs"

[[bin]]
name = "nebula-id"
path = "src/main.rs"

[build-dependencies]
protoc-bin-vendored = "3.2.0"
tonic-prost-build = "0.14"

[features]
default = ["postgresql"]
postgresql = ["sea-orm/sqlx-postgres", "sqlx/postgres"]
sqlite = ["sea-orm/sqlx-sqlite", "sqlx/sqlite"]
etcd = ["dep:etcd-client"]

# sdforge 0.4.2 macros emit #[cfg(feature = "...")] gates for sdforge-internal
# features (http/grpc/cli/mcp/openapi/websocket) inside #[forge] expansions.
# check-cfg only knows about nebulaid's own [features] table, so it would
# flag these as unexpected. Declare them as known cfg values to silence the
# spurious warnings without actually exposing them as nebulaid features.
[lints.rust]
unexpected_cfgs = { level = "allow", check-cfg = [
    'cfg(feature, values("http", "grpc", "cli", "mcp", "openapi", "websocket", "streaming", "cache", "logging", "inklog", "i18n", "security", "ratelimit", "ratelimit-http", "docs", "limiteron-integration", "kit"))',
] }

[dependencies]
# 外部组件（基础设施层）
confers = "0.4"
oxcache = "0.3"
dbnexus = { version = "0.4", default-features = false, features = ["postgres", "runtime-tokio-rustls"] }
sdforge = { version = "0.4", default-features = false, features = ["http", "grpc"] }

# 工具
async-trait = "0.1"
derive_more = { version = "2.0", features = ["display", "error", "from"] }
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1"

# 异步运行时
tokio = { version = "1.50", features = ["full"] }
tokio-stream = "0.1"
futures = "0.3"
futures-util = "0.3"

# Web 框架
axum = { version = "0.8", features = ["json", "macros"] }
axum-extra = { version = "0.10", features = ["typed-header"] }
tower = { version = "0.5", features = ["full"] }
tower-http = { version = "0.5", features = ["cors", "compression-gzip", "timeout", "limit", "trace", "set-header"] }
hyper = { version = "1.8", features = ["full"] }

# OpenAPI 文档
utoipa = { version = "5", features = ["axum_extras", "chrono", "uuid"] }
utoipa-swagger-ui = { version = "9", features = ["axum"] }

# gRPC / Protobuf
tonic = { version = "0.14", features = ["tls-webpki-roots"] }
tonic-prost = "0.14"
prost = "0.14"
prost-types = "0.14"

# 分布式协调
etcd-client = { version = "0.17", optional = true }

# 缓存与存储
lru = "0.16"
parking_lot = "0.12"

# 数据库
sea-orm = { version = "1.1", features = ["runtime-tokio-rustls", "with-chrono", "with-uuid", "postgres-array"] }
sea-orm-migration = { version = "1.1", optional = true }
sqlx = { version = "0.8", default-features = false, optional = true, features = ["runtime-tokio", "tls-rustls", "uuid", "chrono"] }

# 监控与指标
prometheus-client = { version = "0.24", default-features = false }
prometheus = "0.14"

# 日志追踪
tracing = "0.1"
tracing-subscriber = { version = "0.3.22", features = ["env-filter", "json"] }
tracing-appender = "0.2"

# 工具库
uuid = { version = "1.22", features = ["v4", "v7", "v8", "serde"] }
chrono = { version = "0.4", features = ["std"] }
hex = "0.4"
base64 = "0.21"
sha2 = "0.11"
hmac = "0.12"
getrandom = "0.2"
rand = "0.10"
subtle = "2.5"
regex = "1"
toml = "1.1"
reqwest = { version = "0.13", features = ["json"] }
validator = { version = "0.20", features = ["derive"] }
winnow = "0.5"
serde_with = "3"
config = "0.15"
humantime = "2"

# 命令行
clap = { version = "4.6", features = ["derive"] }

# 错误处理
anyhow = "1.0"

# 认证
authrs = { version = "0.1.2", features = ["api-key"] }

# 加密
rustls = "0.23"
tokio-rustls = "0.25"
rustls-pemfile = "2"

# 基础组件
arc-swap = "1.6"
crossbeam = "0.8"
smallvec = "1"
bytes = "1"
crc32fast = "1"
either = "1"
pin-project = "1.1"

# 速率限制和流量控制 - 使用 limiteron 库
limiteron = { version = "0.2", default-features = false, features = ["postgres", "quota-control", "ban-manager"] }

[dev-dependencies]
mockall = "0.13"
proptest = "1.4"
quickcheck = "1"
sea-orm = { version = "1.1", features = ["mock"] }
tempfile = "3"
tokio-test = "0.4"
reqwest = { version = "0.13", features = ["json"] }

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 4
strip = true
panic = "abort"

[profile.dev]
debug = true
split-debuginfo = "unpacked"

[profile.test]
opt-level = 0

[profile.bench]
opt-level = 3
lto = true
