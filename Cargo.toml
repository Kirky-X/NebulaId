[package]
name = "nebulaid"
version = "0.1.1"
description = "Enterprise-grade distributed ID generation system"
authors = ["Kirky.X"]
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/Kirky-X/NebulaId"
homepage = "https://github.com/Kirky-X/NebulaId"
keywords = ["distributed", "id-generator", "snowflake", "uuid"]
categories = ["development-tools", "database"]

[lib]
name = "nebulaid"
path = "src/lib.rs"

[[bin]]
name = "nebula-id"
path = "src/main.rs"

[build-dependencies]
protoc-bin-vendored = "3.2.0"
tonic-prost-build = "0.14"

[features]
default = ["postgresql"]
postgresql = ["sea-orm/sqlx-postgres", "sqlx/postgres"]
sqlite = ["sea-orm/sqlx-sqlite", "sqlx/sqlite"]
etcd = ["dep:etcd-client"]

[dependencies]
# 外部组件（基础设施层）
confers = { path = "../confers" }
oxcache = { path = "../oxcache" }
dbnexus = { path = "../dbnexus" }

# 工具
async-trait = "0.1"
derive_more = { version = "1.0", features = ["display", "error", "from"] }
thiserror = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# 异步运行时
tokio = { version = "1.49", features = ["full"] }
tokio-stream = "0.1"
futures = "0.3"
futures-util = "0.3"

# Web 框架
axum = { version = "0.8.8", features = ["json", "macros"] }
axum-extra = { version = "0.10", features = ["typed-header"] }
tower = { version = "0.4", features = ["full"] }
tower-http = { version = "0.5", features = ["cors", "compression-gzip", "timeout", "limit", "trace", "set-header"] }
hyper = { version = "1.8", features = ["full"] }

# OpenAPI 文档
utoipa = { version = "5", features = ["axum_extras", "chrono", "uuid"] }
utoipa-swagger-ui = { version = "8", features = ["axum"] }

# gRPC / Protobuf
tonic = { version = "0.14", features = ["tls-webpki-roots"] }
tonic-prost = "0.14"
prost = "0.14.1"
prost-types = "0.14.1"

# 分布式协调
etcd-client = { version = "0.17", optional = true }

# 缓存与存储
redis = { version = "0.26", features = ["tokio-comp", "aio"] }
dashmap = "6"
lru = "0.16"
parking_lot = "0.12"

# 数据库
sea-orm = { version = "1.1", features = ["runtime-tokio-rustls", "with-chrono", "with-uuid", "postgres-array"] }
sea-orm-migration = { version = "1.1", optional = true }
sqlx = { version = "0.8", default-features = false, optional = true, features = ["runtime-tokio", "tls-rustls", "uuid", "chrono"] }

# 监控与指标
prometheus-client = { version = "0.24", default-features = false }
prometheus = "0.14"

# 日志追踪
tracing = "0.1"
tracing-subscriber = { version = "0.3.22", features = ["env-filter", "json"] }
tracing-appender = "0.2"

# 工具库
uuid = { version = "1", features = ["v4", "v7", "v8", "serde"] }
chrono = { version = "0.4", features = ["std"] }
hex = "0.4"
base64 = "0.21"
sha2 = "0.10"
hmac = "0.12"
getrandom = "0.2"
rand = "0.8"
subtle = "2.5"
regex = "1"
toml = "0.8"
reqwest = { version = "0.13", features = ["json"] }
validator = { version = "0.20", features = ["derive"] }
winnow = "0.5"
serde_with = "3"
config = "0.14"
humantime = "2"

# 命令行
clap = { version = "4", features = ["derive"] }

# 错误处理
anyhow = "1"

# 认证
authrs = { version = "0.1.2", features = ["api-key"] }

# 加密
rustls = "0.22"
tokio-rustls = "0.25"
rustls-pemfile = "2"

# 基础组件
arc-swap = "1.6"
crossbeam = "0.8"
bytes = "1"
crc32fast = "1"
either = "1"
pin-project = "1.1"

# 速率限制和流量控制 - 使用 limiteron 库
limiteron = { path = "../limiteron", default-features = false, features = ["postgres", "quota-control", "ban-manager"] }

[dev-dependencies]
mockall = "0.13"
proptest = "1.4"
quickcheck = "1"
sea-orm = { version = "1.1", features = ["mock"] }
tempfile = "3"
tokio-test = "0.4"
reqwest = { version = "0.13", features = ["json"] }

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 4
strip = true
panic = "abort"

[profile.dev]
debug = true
split-debuginfo = "unpacked"

[profile.test]
opt-level = 0

[profile.bench]
opt-level = 3
lto = true
