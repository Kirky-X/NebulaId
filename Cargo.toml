[package]
name = "nebulaid"
version = "0.2.0"
description = "Enterprise-grade distributed ID generation system"
authors = ["Kirky.X"]
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/Kirky-X/NebulaId"
homepage = "https://github.com/Kirky-X/NebulaId"
keywords = ["distributed", "id-generator", "snowflake", "uuid"]
categories = ["development-tools", "database"]

[lib]
name = "nebulaid"
path = "src/lib.rs"

[[bin]]
name = "nebula-id"
path = "src/main.rs"

[build-dependencies]
protoc-bin-vendored = "3.2.0"
tonic-prost-build = "0.14"

[features]
default = ["postgresql", "http", "grpc"]
postgresql = ["sea-orm/sqlx-postgres", "sqlx/postgres"]
sqlite = ["sea-orm/sqlx-sqlite", "sqlx/sqlite"]
etcd = ["dep:etcd-client"]
# Gate the `mod tests` integration-test blocks (those requiring a live
# database, marked #[ignore]). When this feature is disabled, those test
# modules are not compiled, so cargo-llvm-cov does not count their lines
# as uncovered. Enable with `--features integration-tests` to run them
# against a real database (`DATABASE_URL` + `--ignored`).
integration-tests = []

# sdforge 0.4.4 macros emit #[cfg(feature = "http")] / #[cfg(feature = "grpc")]
# gates *inside* the downstream crate's #[forge] expansion. These gates are
# evaluated against nebulaid's own [features] table, not sdforge's. Without
# mirror features here, inventory::submit!(RouteRegistration) gets cfg'd out
# and init_all_plugins() returns 0 routes (silent regression observed when
# sdforge-macros upgraded 0.4.2 → 0.4.4, which added these gates).
#
# These are empty mirror features — sdforge's http/grpc features are still
# hardcoded in the sdforge dependency declaration below. The mirror features
# only exist so the macro-emitted #[cfg(feature = "http")] evaluates to true
# in nebulaid's crate context. When a user explicitly disables them via
# --no-default-features, sdforge::http remains available (hardcoded) but
# inventory::submit! is cfg'd out — init_sdforge() will return 0 routes,
# which is the expected behavior for a build that opts out of sdforge
# route registration.
http = []
grpc = []

# sdforge 0.4.4 macros also emit #[cfg(feature = "...")] gates for other
# sdforge-internal features (cli/mcp/openapi/websocket/streaming/cache/...)
# inside #[forge] expansions. check-cfg only knows about nebulaid's own
# [features] table, so it would flag these as unexpected. Declare them as
# known cfg values to silence the spurious warnings without actually
# exposing them as nebulaid features (we only enable http + grpc above).
[lints.rust]
unexpected_cfgs = { level = "allow", check-cfg = [
    'cfg(feature, values("http", "grpc", "cli", "mcp", "openapi", "websocket", "streaming", "cache", "logging", "inklog", "i18n", "security", "ratelimit", "ratelimit-http", "docs", "limiteron-integration", "kit"))',
] }

[dependencies]
# 外部组件（基础设施层）
confers = "0.4"
oxcache = "0.3"
dbnexus = { version = "0.4", default-features = false, features = ["postgres", "runtime-tokio-rustls"] }
sdforge = { version = "0.4", default-features = false, features = ["http", "grpc"] }

# 工具
async-trait = "0.1"
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1"

# 异步运行时
tokio = { version = "1.50", features = ["full"] }
tokio-stream = "0.1"
futures-util = "0.3"

# Web 框架
axum = { version = "0.8", features = ["json", "macros"] }
tower = { version = "0.5", features = ["full"] }
tower-http = { version = "0.5", features = ["cors", "compression-gzip", "timeout", "limit", "trace", "set-header"] }
hyper = { version = "1.8", features = ["full"] }

# OpenAPI 文档
utoipa = { version = "5", features = ["axum_extras", "chrono", "uuid"] }

# gRPC / Protobuf
tonic = { version = "0.14", features = ["tls-webpki-roots"] }
tonic-prost = "0.14"
prost = "0.14"

# 分布式协调
etcd-client = { version = "0.17", optional = true }

# 缓存与存储
parking_lot = "0.12"

# 数据库
sea-orm = { version = "1.1", features = ["runtime-tokio-rustls", "with-chrono", "with-uuid", "postgres-array"] }
sqlx = { version = "0.9", default-features = false, optional = true, features = ["runtime-tokio", "tls-rustls", "uuid", "chrono"] }

# 日志追踪
tracing = "0.1"
tracing-subscriber = { version = "0.3.22", features = ["env-filter", "json"] }

# 工具库
uuid = { version = "1.22", features = ["v4", "v7", "v8", "serde"] }
chrono = { version = "0.4", features = ["std"] }
hex = "0.4"
base64 = "0.21"
sha2 = "0.11"
hmac = "0.12"
getrandom = "0.2"
rand = "0.10"
subtle = "2.5"
# Argon2id 用于 API key 密钥哈希（替代 SHA256，CWE-916 修复）
# 显式禁用默认特性以减少依赖体积，仅启用 password-hash（PHC 格式支持）与 alloc
argon2 = { version = "0.5", default-features = false, features = ["alloc", "password-hash"] }
regex = "1"
toml = "1.1"
reqwest = { version = "0.13", features = ["json"] }
validator = { version = "0.20", features = ["derive"] }
serde_with = "3"
config = "0.15"

# 错误处理
anyhow = "1.0"

# 加密
rustls = "0.23"
tokio-rustls = "0.26"
rustls-pemfile = "2"

# 基础组件
arc-swap = "1.6"
smallvec = "1"
bytes = "1"
crc32fast = "1"
either = "1"
pin-project = "1.1"
# Phase 9 T043 (CRITICAL C1) — used by `redact_db_url` to scrub DB
# passwords before `final_url` enters tracing logs. reqwest/sea-orm
# already pull url in transitively; declaring it explicitly lets us
# call `Url::set_password` without relying on a downstream re-export.
url = "2"

# 速率限制和流量控制 - 使用 limiteron 库
limiteron = { version = "0.2", default-features = false, features = ["postgres", "quota-control", "ban-manager"] }

# 国际化 (ICU i18n — Phase 8)
# Phase 8 T041 (MED-001 fix) — pinned to `3.1` (Major.Minor per rule 29).
# `src/core/i18n.rs` calls `crate::_rust_i18n_try_translate` and
# `rust_i18n::replace_patterns`, both `#[doc(hidden)] pub fn` generated
# by the `i18n!` macro. The minor pin limits breakage risk if a future
# 3.x release renames or removes these hidden APIs. If rust-i18n 4.x
# exposes a stable per-locale translate API, migrate accordingly.
#
# Phase 8 T041 (LOW L-8 fix, rule 28) — `default-features = false`
# disables rust-i18n's default `accept-language` feature (we provide
# our own `parse_accept_language` in `src/server/middleware/locale.rs`
# with stricter RFC 7231 §5.3.1 conformance + DoS guards). The
# `i18n!` macro and `t!()` / `_rust_i18n_try_translate` / `replace_patterns`
# APIs do not require the default features.
rust-i18n = { version = "3.1", default-features = false }

[dev-dependencies]
mockall = "0.13"
sea-orm = { version = "1.1", features = ["mock"] }
tempfile = "3"
reqwest = { version = "0.13", features = ["json"] }
# Phase 8 T041 (LOW L4 perf) — criterion bench for i18n translation
# overhead and locale negotiation. `default-features = false` per rule 28;
# we only need the sync API (no async_tokio) for these micro-benchmarks.
criterion = { version = "0.5", default-features = false }
# TLS 测试用：生成自签证书 (default-features = false per rule 28)
rcgen = { version = "0.13", default-features = false, features = ["pem", "ring"] }

[[bench]]
name = "i18n"
harness = false

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 4
strip = true
panic = "abort"

[profile.dev]
debug = true
split-debuginfo = "unpacked"

[profile.test]
opt-level = 0

[profile.bench]
opt-level = 3
lto = true
